<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWE CS2 · Resultathistorik</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0a0c0f;--surface:#111418;--surface2:#181d24;--border:#1f2733;
      --accent:#f0d000;--accent2:#00e5a0;--red:#ff3d5a;--text:#d6dce8;--muted:#6b7a90;
      --mono:'Share Tech Mono',monospace;--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,208,0,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(240,208,0,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    /* ── HEADER ── */
    header{position:sticky;top:0;z-index:100;background:rgba(10,12,15,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:58px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-text{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:.08em;color:#fff;text-transform:uppercase}
    .logo-text span{color:var(--accent)}
    nav{display:flex;gap:4px;justify-content:center}
    nav a{font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:6px 16px;border-radius:4px;border:1px solid transparent;transition:color .15s,background .15s,border-color .15s}
    nav a:hover{color:var(--text);background:var(--surface2)}
    nav a.active{color:var(--accent);background:rgba(240,208,0,.08);border-color:rgba(240,208,0,.25)}
    .header-spacer{display:flex;justify-content:flex-end}

    /* ── MAIN ── */
    main{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:28px 20px 60px}
    .page-title{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;display:flex;align-items:center;gap:10px}
    .page-title::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ── CONTROLS ── */
    .controls{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
    .search-wrap{flex:1;min-width:180px;max-width:280px;position:relative}
    .search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
    #search-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--body);font-size:14px;padding:7px 12px 7px 30px;border-radius:4px;outline:none;transition:border-color .15s}
    #search-input:focus{border-color:var(--accent)}
    #search-input::placeholder{color:var(--muted)}

    /* ── STATS PANELS ── */
    .stats-section{margin-bottom:24px;display:flex;flex-direction:column;gap:10px}

    .period-tabs{display:flex;gap:4px;flex-wrap:wrap}
    .period-tab{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
    .period-tab:hover{color:var(--text);border-color:var(--text)}
    .period-tab.active{color:var(--accent);background:rgba(240,208,0,.08);border-color:rgba(240,208,0,.25)}

    .stats-bar{display:flex;gap:1px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
    .stat-item{flex:1;padding:14px 16px;background:var(--surface);text-align:center}
    .stat-value{font-family:var(--mono);font-size:26px;color:#fff;line-height:1;margin-bottom:4px}
    .stat-value.green{color:var(--accent2)}
    .stat-value.yellow{color:var(--accent)}
    .stat-value.red{color:var(--red)}
    .stat-label{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

    /* ── RESULT CARD ── */
    .result-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;animation:cardIn .25s ease both}
    @keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .result-card:hover{border-color:rgba(240,208,0,.3)}
    .result-card__row{display:flex;align-items:center;padding:14px 18px;gap:14px}
    .result-date{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:48px;white-space:nowrap}
    .result-tournament{font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);min-width:120px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .result-teams{flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0}

    .rt{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
    .rt.right{align-items:flex-end}
    .rt-namerow{display:flex;align-items:center;gap:8px}
    .rt.right .rt-namerow{flex-direction:row-reverse}
    .rt-logo{width:28px;height:28px;object-fit:contain;background:var(--surface2);border-radius:3px;padding:3px;flex-shrink:0}
    .rt-logo-ph{width:28px;height:28px;background:var(--surface2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
    .rt-name{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.03em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rt-name.winner{color:var(--accent2)}
    .rt-name.loser{color:var(--muted)}
    .rt-name.swe-hl{color:var(--accent2)}
    .swe-pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;white-space:nowrap}
    .swe-pill.full{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--accent2)}
    .swe-pill.majority{background:rgba(100,149,237,.1);border:1px solid rgba(100,149,237,.3);color:#7aabff}
    .swe-pill.partial{background:rgba(240,208,0,.08);border:1px solid rgba(240,208,0,.25);color:var(--accent)}
    .location-badge{font-family:var(--display);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em}

    .result-score{display:flex;flex-direction:column;align-items:center;padding:0 10px;min-width:72px}
    .rs-main{font-family:var(--mono);font-size:22px;line-height:1}
    .rs-label{font-family:var(--display);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:3px}

    /* Map expand */


    .date-group{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);padding:20px 0 10px;display:flex;align-items:center;gap:10px}
    .date-group::after{content:'';flex:1;height:1px;background:var(--border)}

    .state-card{text-align:center;padding:60px 20px;color:var(--muted)}
    .state-card .icon{font-size:42px;margin-bottom:16px;opacity:.4}
    .state-card h3{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:.06em;color:var(--text);margin-bottom:8px}
    .state-card p{font-size:15px;line-height:1.6;max-width:420px;margin:0 auto}
    .state-card a{color:var(--accent2)}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pagination-info{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;padding:14px 0}

    @media(max-width:600px){
      .result-tournament{display:none}
      .rt-name{font-size:13px}
      .rs-main{font-size:16px}
      .stats-bar{flex-wrap:wrap}
      .stat-item{min-width:48%}
      .result-card__row{flex-wrap:wrap;gap:8px}
      .result-date{min-width:auto}
      .result-teams{width:100%}
      .rt-namerow{gap:5px}
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="./">
    <svg class="logo-flag" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="28" height="28"><rect width="32" height="32" rx="6" fill="#004B87"/><rect y="12" width="32" height="8" fill="#FFC200"/><rect x="11" width="8" height="32" fill="#FFC200"/></svg>
    <span class="logo-text">SWE<span>CS2</span></span>
  </a>
  <nav>
    <a href="./">Live</a>
    <a href="history" class="active">Historik</a>
  </nav>
  <div class="header-spacer"></div>
</header>

<main>
  <div class="page-title">Resultathistorik · Svensk CS2-tracker</div>

  <div class="controls">
    <div class="search-wrap">
      <input id="search-input" type="text" autocomplete="off"
             placeholder="Sök lag eller turnering…" oninput="onSearch(this.value)" />
    </div>
  </div>

  <div id="stats-section" class="stats-section" style="display:none">
    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod('year')">I år</button>
      <button class="period-tab" onclick="setPeriod('9m')">9 månader</button>
      <button class="period-tab" onclick="setPeriod('6m')">6 månader</button>
      <button class="period-tab" onclick="setPeriod('3m')">3 månader</button>
      <button class="period-tab" onclick="setPeriod('month')">Den här månaden</button>
      <button class="period-tab" onclick="setPeriod('week')">Den här veckan</button>
      <button class="period-tab" onclick="setPeriod('day')">Idag</button>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Matcher</div></div>
      <div class="stat-item"><div class="stat-value green" id="stat-wins">—</div><div class="stat-label">SWE Vinster</div></div>
      <div class="stat-item"><div class="stat-value red" id="stat-losses">—</div><div class="stat-label">SWE Förluster</div></div>
      <div class="stat-item"><div class="stat-value yellow" id="stat-winrate">—</div><div class="stat-label">Vinstprocent</div></div>
    </div>
  </div>

  <div id="content">
    <div class="state-card"><div class="spinner"></div><p>Laddar matchhistorik…</p></div>
  </div>
</main>

<script src="shared.js"></script>
<script>
const HISTORY_KEY = 'swe_history';
const PERIODS = ['year','9m','6m','3m','month','week','day'];

let allMatches   = [];
let searchQuery  = '';
let activePeriod = 'year';

window.addEventListener('DOMContentLoaded', () => {
  allMatches = loadAndPruneHistory();
  if (allMatches.length) {
    document.getElementById('stats-section').style.display = 'flex';
    renderResults();
  }
  fetchAndMerge();
});

function loadAndPruneHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    const matches = JSON.parse(raw);
    const yearStart = new Date(new Date().getFullYear(), 0, 1);
    const pruned = matches.filter(m => new Date(m.end_at || m.begin_at) >= yearStart);
    if (pruned.length !== matches.length) saveHistory(pruned);
    return pruned;
  } catch(_) { return []; }
}

function saveHistory(matches) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(matches)); } catch(_) {}
}

async function fetchAndMerge() {
  try {
    await ensureSwedishData();

    const yearStart = new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0];
    const today     = new Date().toISOString().split('T')[0];
    const storedIds = new Set(allMatches.map(m => m.id));

    // Fetch per Swedish team ID — guarantees we get every match for every
    // Swedish-player team, no matter how many non-Swedish matches exist in between.
    const sweTeamIds = Object.keys(_sweTeamData);
    const newMatches = [];

    // Batch team IDs into groups of 10 to keep API call count low
    // PandaScore supports filter[opponent_id][]=id1&filter[opponent_id][]=id2 …
    const CHUNK = 10;
    for (let i = 0; i < sweTeamIds.length; i += CHUNK) {
      const chunk = sweTeamIds.slice(i, i + CHUNK);
      const qp = chunk.map(id => `filter[opponent_id][]=${id}`).join('&');
      let page = 1;
      while (true) {
        const batch = await pandaFetch(
          `/csgo/matches/past?per_page=50&sort=-end_at&page=${page}&include=opponents,results&range[end_at]=${yearStart},${today}&${qp}`
        );
        if (!batch.length) break;
        // Only keep matches where at least one opponent is a Swedish team
        batch.filter(hasSweTeam).forEach(m => newMatches.push(m));
        // Stop paging this chunk if we've seen all these matches before
        const allKnown = batch.every(m => storedIds.has(m.id));
        if (allKnown || batch.length < 50) break;
        page++;
        if (page > 6) break; // 300 matches per chunk is more than enough
      }
    }

    const byId = {};
    allMatches.forEach(m => { byId[m.id] = m; });
    newMatches.forEach(m => { byId[m.id] = m; });
    allMatches = Object.values(byId).sort((a, b) =>
      new Date(b.end_at || b.begin_at) - new Date(a.end_at || a.begin_at)
    );

    saveHistory(allMatches);
    document.getElementById('stats-section').style.display = 'flex';
    renderResults();

  } catch(err) {
    console.error('[SWE History] Fetch error:', err);
    if (!allMatches.length) {
      document.getElementById('content').innerHTML = `
        <div class="state-card">
          <div class="icon">⚠️</div><h3>Anslutningsfel</h3>
          <p>${err.status ? 'API-fel ' + err.status + '.' : 'Kunde inte nå servern.'}</p>
        </div>`;
    }
  }
}

function onSearch(val) { searchQuery = val.toLowerCase().trim(); renderResults(); }

function setPeriod(p) {
  activePeriod = p;
  document.querySelectorAll('.period-tab').forEach((b, i) => {
    b.classList.toggle('active', PERIODS[i] === p);
  });
  renderResults();
}

function periodStart(period) {
  const now = new Date();
  if (period === 'day')   return new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (period === 'week')  { const d = new Date(now); d.setDate(d.getDate() - ((d.getDay()+6)%7)); d.setHours(0,0,0,0); return d; }
  if (period === 'month') return new Date(now.getFullYear(), now.getMonth(), 1);
  if (period === '3m')    return new Date(now.getTime() - 90  * 24*60*60*1000);
  if (period === '6m')    return new Date(now.getTime() - 180 * 24*60*60*1000);
  if (period === '9m')    return new Date(now.getTime() - 270 * 24*60*60*1000);
  if (period === 'year')  return new Date(now.getFullYear(), 0, 1);
  return null;
}

function matchesSearch(match) {
  if (!searchQuery) return true;
  const t1   = match.opponents?.[0]?.opponent?.name?.toLowerCase() || '';
  const t2   = match.opponents?.[1]?.opponent?.name?.toLowerCase() || '';
  const tour = (match.tournament?.name || match.league?.name || '').toLowerCase();
  return t1.includes(searchQuery) || t2.includes(searchQuery) || tour.includes(searchQuery);
}

function calcStats(matches) {
  let wins = 0, losses = 0;
  matches.forEach(m => {
    if (!m.winner) return;
    const t1 = m.opponents?.[0]?.opponent;
    const t2 = m.opponents?.[1]?.opponent;
    const sweT = sweInfo(t1) ? t1 : sweInfo(t2) ? t2 : null;
    if (!sweT) return;
    if (m.winner.id === sweT.id) wins++; else losses++;
  });
  return { total: matches.length, wins, losses };
}

function renderResults() {
  const start    = periodStart(activePeriod);
  const filtered = allMatches.filter(m => {
    if (!matchesSearch(m)) return false;
    if (start && new Date(m.end_at || m.begin_at) < start) return false;
    return true;
  });

  const { total, wins, losses } = calcStats(filtered);
  const wr = (wins + losses) > 0 ? Math.round(wins / (wins + losses) * 100) + '%' : '—';
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-wins').textContent    = wins;
  document.getElementById('stat-losses').textContent  = losses;
  document.getElementById('stat-winrate').textContent = wr;

  if (!filtered.length) {
    document.getElementById('content').innerHTML = `
      <div class="state-card"><div class="icon">📂</div><h3>Inga resultat hittades</h3>
      <p>${searchQuery ? 'Inga matcher för "' + searchQuery + '".' : 'Inga svenska matcher under den här perioden ännu.'}</p></div>`;
    return;
  }

  const groups = {};
  filtered.forEach(m => {
    const d   = m.end_at ? new Date(m.end_at) : new Date(m.begin_at);
    const key = d.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  let html = '';
  Object.entries(groups).forEach(([date, matches], gi) => {
    html += `<div class="date-group">${date}</div>`;
    matches.forEach((m, i) => { html += renderResultCard(m, gi * 50 + i * 30); });
  });
  html += `<div class="pagination-info">${filtered.length} matcher visade · ${allMatches.length} lagrade i år</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderResultCard(match, delay) {
  const t1    = match.opponents?.[0]?.opponent;
  const t2    = match.opponents?.[1]?.opponent;
  const t1swe = sweInfo(t1);
  const t2swe = sweInfo(t2);
  const { t1Maps, t2Maps } = extractMapScore(match);
  const t1Win  = match.winner?.id === t1?.id;
  const t2Win  = match.winner?.id === t2?.id;
  const d          = match.end_at ? new Date(match.end_at) : new Date(match.begin_at);
  const timeStr    = d.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' });
  const tournament = match.tournament?.name || match.league?.name || 'CS2';
  const bo         = match.number_of_games ? 'BO' + match.number_of_games : '';
  const cardId     = 'rc-' + match.id;

  const logo = t => t?.image_url
    ? `<img class="rt-logo" src="${t.image_url}" alt="${t.name || ''}" onerror="this.style.display='none'" />`
    : `<div class="rt-logo-ph">${(t?.name || '?')[0].toUpperCase()}</div>`;
  let mapsHtml = '';

  const t1Class = ['rt-name', t1swe ? 'swe-hl' : (t1Win ? 'winner' : t2Win ? 'loser' : '')].filter(Boolean).join(' ');
  const t2Class = ['rt-name', t2swe ? 'swe-hl' : (t2Win ? 'winner' : t1Win ? 'loser' : '')].filter(Boolean).join(' ');

  return `
  <div class="result-card" style="animation-delay:${delay}ms" id="${cardId}">
    <div class="result-card__row">
      <div class="result-date">${timeStr}</div>
      <div class="result-tournament" title="${tournament}">${tournament}</div>
      <div class="result-teams">
        <div class="rt">
          <div class="rt-namerow">${logo(t1)}<span class="${t1Class}">${t1?.name || 'TBD'}</span></div>
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:2px">
            ${swePill(t1swe)}${!t1swe ? teamLocationBadge(t1) : ''}
          </div>
        </div>
        <div class="result-score">
          <div class="rs-main">
            <span style="color:${t1Win ? 'var(--accent2)' : t2Win ? 'var(--muted)' : '#fff'}">${t1Maps}</span>
            <span style="color:var(--muted)">:</span>
            <span style="color:${t2Win ? 'var(--accent2)' : t1Win ? 'var(--muted)' : '#fff'}">${t2Maps}</span>
          </div>
          <div class="rs-label">${bo}</div>
        </div>
        <div class="rt right">
          <div class="rt-namerow">${logo(t2)}<span class="${t2Class}">${t2?.name || 'TBD'}</span></div>
          <div style="display:flex;gap:5px;align-items:center;justify-content:flex-end;flex-wrap:wrap;margin-top:2px">
            ${!t2swe ? teamLocationBadge(t2) : ''}${swePill(t2swe, 'right')}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}


</script>
</body>
</html>
