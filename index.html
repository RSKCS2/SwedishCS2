<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWE CS2 · Direktresultat</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0c0f; --surface:#111418; --surface2:#181d24; --border:#1f2733;
      --accent:#f0d000; --accent2:#00e5a0; --text:#d6dce8; --muted:#6b7a90;
      --mono:'Share Tech Mono',monospace; --display:'Barlow Condensed',sans-serif; --body:'Barlow',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,208,0,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(240,208,0,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    /* ── HEADER ── */
    header{position:sticky;top:0;z-index:100;background:rgba(10,12,15,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:58px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-text{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:.08em;color:#fff;text-transform:uppercase}
    .logo-text span{color:var(--accent)}
    nav{display:flex;gap:4px;justify-content:center}
    nav a{font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:6px 16px;border-radius:4px;border:1px solid transparent;transition:color .15s,background .15s,border-color .15s}
    nav a:hover{color:var(--text);background:var(--surface2)}
    nav a.active{color:var(--accent);background:rgba(240,208,0,.08);border-color:rgba(240,208,0,.25)}
    .header-right{display:flex;justify-content:flex-end;align-items:center;gap:14px}
    .refresh-status{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

    /* ── MAIN ── */
    main{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:28px 20px 40px}
    .page-title{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;display:flex;align-items:center;gap:10px}
    .page-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .section-label{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:28px 0 12px;display:flex;align-items:center;gap:10px}
    .section-label::before{content:'';width:3px;height:14px;background:var(--accent2);border-radius:1px}
    .section-label.upcoming::before{background:var(--accent)}

    /* ── MATCH CARD ── */
    .match-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,transform .15s;animation:cardIn .3s ease both}
    @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .match-card:hover{border-color:rgba(240,208,0,.4);transform:translateY(-1px)}
    .match-card.live{border-left-color:var(--accent2)}
    .match-card.live .match-card__top{background:linear-gradient(90deg,rgba(0,229,160,.04),transparent)}
    .match-card__top{display:flex;align-items:center;padding:16px 18px;gap:14px}

    .match-meta{display:flex;flex-direction:column;gap:4px;min-width:140px}
    .match-tournament{font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
    .match-time{font-family:var(--mono);font-size:12px;color:var(--muted)}
    .live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--accent2);font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.12em;padding:2px 7px;border-radius:3px;text-transform:uppercase}
    .live-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:pulse 1.5s infinite}

    /* ── TEAMS ── */
    .teams-section{flex:1;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .team-col{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
    .team-col.right{align-items:flex-end}
    .team-row{display:flex;align-items:center;gap:10px}
    .team-row.right{flex-direction:row-reverse}
    .team-logo{width:38px;height:38px;border-radius:4px;object-fit:contain;background:var(--surface2);padding:4px;flex-shrink:0}
    .team-logo-ph{width:38px;height:38px;border-radius:4px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
    .team-name{font-family:var(--display);font-size:19px;font-weight:700;letter-spacing:.03em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .team-name.winner{color:var(--accent)}
    .team-name.swe-hl{color:var(--accent2)}
    .swe-pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:3px;white-space:nowrap}
    .swe-pill.full{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--accent2)}
    .swe-pill.majority{background:rgba(100,149,237,.1);border:1px solid rgba(100,149,237,.3);color:#7aabff}
    .swe-pill.partial{background:rgba(240,208,0,.08);border:1px solid rgba(240,208,0,.25);color:var(--accent)}
    .location-badge{font-family:var(--display);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em}

    /* ── SCORE ── */
    .score-section{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 14px;min-width:90px}
    .score-main{font-family:var(--mono);font-size:30px;line-height:1}
    .score-sep{color:var(--muted);margin:0 3px}
    .score-bo{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

    /* ── MAP BREAKDOWN ── */
    .match-card__maps{border-top:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
    .match-card__maps::-webkit-scrollbar{display:none}
    .map-item{flex:1;min-width:110px;padding:10px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
    .map-item:last-child{border-right:none}
    .map-name-row{display:flex;align-items:center;justify-content:space-between}
    .map-name{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .map-name.active{color:#fff}
    .map-status{font-family:var(--mono);font-size:11px;color:var(--muted)}
    .map-status.live{color:var(--accent2)}
    .map-status.done{color:var(--muted)}
    .map-status.pending{color:var(--muted);opacity:.5}
    .map-pending{opacity:.55}
    .map-picker{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .map-picker .pick-label{opacity:.55;font-weight:400}
    .map-picker .pick-team{color:var(--accent);font-weight:700}
    .map-picker .pick-team.swe-pick{color:var(--accent2)}
    .map-picker .pick-decider{color:var(--muted);font-style:italic;font-weight:400}
    .map-score-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
    .map-score{font-family:var(--mono);font-size:22px;line-height:1}
    .map-score.left{text-align:left}
    .map-score.right{text-align:right}
    .map-score.win{color:var(--accent)}
    .map-score.lose{color:var(--muted)}
    .map-dash{color:var(--muted);font-family:var(--mono);font-size:14px;text-align:center}
    .round-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;gap:1px}
    .round-bar .ct{background:rgba(100,160,255,.6)}
    .round-bar .t{background:rgba(255,180,50,.6)}

    /* ── STATES ── */
    .state-card{text-align:center;padding:60px 20px;color:var(--muted)}
    .state-card .icon{font-size:42px;margin-bottom:16px;opacity:.4}
    .state-card h3{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:.06em;color:var(--text);margin-bottom:8px}
    .state-card p{font-size:15px;line-height:1.6;max-width:420px;margin:0 auto}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:600px){
      .match-card__top{flex-wrap:wrap;padding:12px}
      .match-meta{min-width:auto;width:100%}
      .teams-section{width:100%}
      .team-name{font-size:14px}
      .team-logo,.team-logo-ph{width:28px;height:28px}
      .score-main{font-size:22px}
      .score-section{min-width:60px;padding:0 8px}
      .map-item{min-width:88px;padding:8px 10px}
      .map-score{font-size:18px}
      header{padding:0 12px}
      nav a{padding:5px 10px;font-size:13px}
    }
    @media(max-width:360px){
      .team-name{font-size:12px}
      .score-main{font-size:19px}
      .score-section{min-width:50px}
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="./">
    <svg class="logo-flag" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="28" height="28"><rect width="32" height="32" rx="6" fill="#004B87"/><rect y="12" width="32" height="8" fill="#FFC200"/><rect x="11" width="8" height="32" fill="#FFC200"/></svg>
    <span class="logo-text">SWE<span>CS2</span></span>
  </a>
  <nav>
    <a href="./" class="active">Live</a>
    <a href="history">Historik</a>
  </nav>
  <div class="header-right">
    <div class="refresh-status">
      <div class="pulse-dot"></div>
      <span id="last-update">Laddar…</span>
    </div>
  </div>
</header>

<main>
  <div class="page-title">Direktresultat · Svensk CS2-tracker</div>
  <div id="content"><div class="state-card"><div class="spinner"></div><p>Hämtar matcher…</p></div></div>
</main>

<script src="shared.js"></script>
<script>
const LIVE_TTL     = 30  * 1000;
const UPCOMING_TTL = 5   * 60 * 1000;

let pollTimer = null;
let lastScoreKey = '';

window.addEventListener('DOMContentLoaded', () => {
  const cached = cacheGet('swe_live');
  if (cached) renderMatches(cached.live, cached.upcoming);
  fetchMatches();
});

async function fetchMatches() {
  try {
    await ensureSwedishData();

    const [runningList, upcomingList] = await Promise.all([
      // Include games + pick_bans for map names and pick info
      pandaFetch('/csgo/matches/running?per_page=50&include=opponents,results,games,pick_bans'),
      pandaFetch('/csgo/matches/upcoming?per_page=30&sort=begin_at&include=opponents'),
    ]);

    const sweRunning  = runningList.filter(hasSweTeam);
    const sweUpcoming = upcomingList.filter(hasSweTeam);

    // GRID: get CS2 series for live round-score enrichment
    let gridSeries = [];
    try {
      const now = new Date();
      const gte = new Date(now - 3 * 60 * 60 * 1000).toISOString();
      const lte = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString();
      const gd  = await gridFetch('/central', QUERY_CS2_SERIES, { gte, lte });
      gridSeries = (gd?.allSeries?.edges || []).map(e => e.node).filter(s => s.title?.nameShortened === 'cs2');
    } catch(e) { console.warn('[GRID] Central failed:', e); }

    // Enrich each live match with GRID series state (round scores + map names)
    const enriched = await Promise.all(sweRunning.map(async match => {
      const t1 = match.opponents?.[0]?.opponent;
      const t2 = match.opponents?.[1]?.opponent;
      const gridMatch = findGridSeries(t1?.name, t2?.name, gridSeries);
      let state = null;
      if (gridMatch) {
        try {
          const sd = await gridFetch('/live', QUERY_SERIES_STATE, { id: gridMatch.id });
          state = sd?.seriesState || null;
        } catch(e) { console.warn('[GRID] State failed:', e); }
      }
      return { ...match, gridMatch, state };
    }));

    cacheSet('swe_live', { live: enriched, upcoming: sweUpcoming });

    const scoreKey = JSON.stringify(enriched.map(m => ({
      id: m.id,
      games: m.state?.games?.map(g => g.teams?.map(t => t.score)),
    })));

    if (scoreKey !== lastScoreKey) {
      lastScoreKey = scoreKey;
      renderMatches(enriched, sweUpcoming);
    }

    document.getElementById('last-update').textContent = 'Uppdaterad ' + new Date().toLocaleTimeString('sv-SE');

    const interval = enriched.length > 0 ? LIVE_TTL : sweUpcoming.length > 0 ? UPCOMING_TTL : 15 * 60 * 1000;
    clearTimeout(pollTimer);
    pollTimer = setTimeout(fetchMatches, interval);

  } catch(err) {
    console.error('[SWE CS2] Fetch error:', err);
    if (!cacheGet('swe_live')) {
      document.getElementById('content').innerHTML = `
        <div class="state-card">
          <div class="icon">⚠️</div>
          <h3>Anslutningsfel</h3>
          <p>${err.status ? 'API-fel ' + err.status + '.' : 'Kunde inte nå servern.'}</p>
        </div>`;
    }
    clearTimeout(pollTimer);
    pollTimer = setTimeout(fetchMatches, 60 * 1000);
  }
}


// ── MAP WIN-RATE from cached history ─────────────────────────────────────
function mapWinRate(teamId, mapNameFormatted) {
  try {
    const raw = localStorage.getItem('swe_history');
    if (!raw) return null;
    const history = JSON.parse(raw);
    let wins = 0, losses = 0;
    history.forEach(m => {
      if (!m.winner || !m.games) return;
      m.games.forEach(g => {
        const mn = formatMapName(g.map?.name);
        if (mn !== mapNameFormatted) return;
        if (g.status === 'finished' || g.winner) {
          const winnerId = g.winner?.id ?? (m.winner?.id === (m.opponents?.[0]?.opponent?.id) ? m.opponents?.[0]?.opponent?.id : m.opponents?.[1]?.opponent?.id);
          // check via game results
          if (g.results?.length) {
            const teamResult = g.results.find(r => r.team_id === teamId);
            const opp = g.results.find(r => r.team_id !== teamId);
            if (teamResult && opp) {
              if (teamResult.score > opp.score) wins++; else losses++;
            }
          }
        }
      });
    });
    const total = wins + losses;
    if (total < 2) return null; // not enough data
    const pct = Math.round(wins / total * 100);
    return { wins, losses, total, pct };
  } catch(_) { return null; }
}

function renderMatches(live, upcoming) {
  let html = '';
  if (!live.length && !upcoming.length) {
    html = `<div class="state-card"><div class="icon">📡</div><h3>Inga svenska matcher just nu</h3><p>Det finns inga direktsända eller kommande CS2-matcher med svenska spelare för tillfället.</p></div>`;
  } else {
    if (live.length) {
      html += `<div class="section-label"><span class="live-badge" style="font-size:12px;padding:3px 10px"><span class="dot"></span>LIVE</span><span style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:6px">${live.length} match${live.length !== 1 ? 'er' : ''}</span></div>`;
      live.forEach((m, i) => { html += renderCard(m, true, i * 50); });
    }
    if (upcoming.length) {
      html += `<div class="section-label upcoming">Kommande</div>`;
      upcoming.forEach((m, i) => { html += renderCard(m, false, i * 40); });
    }
  }
  document.getElementById('content').innerHTML = html;
}

function renderCard(match, isLive, delay) {
  const t1      = match.opponents?.[0]?.opponent;
  const t2      = match.opponents?.[1]?.opponent;
  const t1swe   = sweInfo(t1);
  const t2swe   = sweInfo(t2);
  const { t1Maps, t2Maps } = extractMapScore(match);
  const t1Win   = match.winner?.id === t1?.id;
  const t2Win   = match.winner?.id === t2?.id;
  const bo      = match.number_of_games ? 'BO' + match.number_of_games : 'BO?';
  const tournament = match.tournament?.name || match.league?.name || 'CS2';
  const timeStr = isLive
    ? 'LIVE'
    : new Date(match.begin_at).toLocaleString('sv-SE', { weekday:'short', hour:'2-digit', minute:'2-digit' }).toUpperCase();

  const state      = match.state;
  const stateGames = state?.games || [];

  // Extract picks from PandaScore pick_bans
  const picks = extractPicksInOrder(match);

  let mapsHtml = '';

  // Helper: build one map-item card used in both GRID and PandaScore paths
  function buildMapItem(mn, pick, r1, r2, status, t1Id, t2Id) {
    // status: 'live' | 'done' | 'pending'
    const isSwePickTeam = pick && ((t1swe && pick.teamId === t1Id) || (t2swe && pick.teamId === t2Id));

    // Win-rate rows for both teams (only if we have map name)
    let wrHtml = '';
    if (mn) {
      const wr1 = t1?.id ? mapWinRate(t1.id, mn) : null;
      const wr2 = t2?.id ? mapWinRate(t2.id, mn) : null;
      if (wr1 || wr2) {
        const fmt = (wr, name) => wr
          ? `<span style="font-family:var(--mono);font-size:10px;color:${wr.pct>=50?'var(--accent2)':'var(--muted)'};">${wr.pct}% (${wr.wins}V/${wr.losses}F)</span>`
          : '';
        const r1html = fmt(wr1, t1?.name);
        const r2html = fmt(wr2, t2?.name);
        if (r1html || r2html) {
          wrHtml = `<div style="display:flex;justify-content:space-between;gap:4px;margin-top:2px">${r1html}<span></span>${r2html}</div>`;
        }
      }
    }

    let pickerHtml = '';
    if (pick) {
      pickerHtml = `<div class="map-picker"><span class="pick-label">Val: </span><span class="pick-team${isSwePickTeam ? ' swe-pick' : ''}">${pick.teamName || '?'}</span></div>`;
    } else if (status === 'pending' && mn) {
      pickerHtml = `<div class="map-picker"><span class="pick-decider">Avgörande</span></div>`;
    }

    if (status === 'done') {
      return `<div class="map-item">
        <div class="map-name-row"><span class="map-name">${mn || '—'}</span><span class="map-status done">AVSLUTAD</span></div>
        ${pickerHtml}
        <div class="map-score-row">
          <span class="map-score left ${r1 > r2 ? 'win' : 'lose'}">${r1 ?? '—'}</span>
          <span class="map-dash">:</span>
          <span class="map-score right ${r2 > r1 ? 'win' : 'lose'}">${r2 ?? '—'}</span>
        </div>
        ${wrHtml}</div>`;
    } else if (status === 'live') {
      const tot = Math.max(1, (r1 || 0) + (r2 || 0));
      return `<div class="map-item">
        <div class="map-name-row"><span class="map-name active">${mn || '—'}</span><span class="map-status live">● LIVE</span></div>
        ${pickerHtml}
        <div class="map-score-row">
          <span class="map-score left">${r1 ?? '—'}</span><span class="map-dash">:</span><span class="map-score right">${r2 ?? '—'}</span>
        </div>
        <div class="round-bar">
          <div class="ct" style="width:${Math.round((r1 || 0) / tot * 100)}%"></div>
          <div class="t"  style="width:${Math.round((r2 || 0) / tot * 100)}%"></div>
        </div>
        ${wrHtml}</div>`;
    } else {
      return `<div class="map-item map-pending">
        <div class="map-name-row"><span class="map-name">${mn || 'TBD'}</span><span class="map-status pending">NÄSTA</span></div>
        ${pickerHtml}
        ${wrHtml}<div style="height:${wrHtml?'4':'22'}px"></div></div>`;
    }
  }

  if (isLive && stateGames.length) {
    // GRID path — has live round scores + map names
    const t1StateName = state?.teams?.find(t => normName(t.name) === normName(t1?.name))?.name || state?.teams?.[0]?.name;
    const t2StateName = state?.teams?.find(t => normName(t.name) === normName(t2?.name))?.name || state?.teams?.[1]?.name;

    const mapItems = stateGames.map((g, idx) => {
      let mn = formatMapName(g.map?.name);
      if (!mn) {
        const pg = (match.games || []).find(x => x.position === g.sequenceNumber || x.game_number === g.sequenceNumber);
        mn = formatMapName(pg?.map?.name);
      }
      const r1 = g.teams?.find(t => t.name === t1StateName)?.score ?? null;
      const r2 = g.teams?.find(t => t.name === t2StateName)?.score ?? null;
      const status = g.finished ? 'done' : g.started ? 'live' : 'pending';
      const pick = picks[idx] || null;
      return buildMapItem(mn, pick, r1, r2, status, t1?.id, t2?.id);
    }).join('');
    mapsHtml = `<div class="match-card__maps">${mapItems}</div>`;

  } else if (isLive && (match.games || []).some(g => g.status !== 'not_started')) {
    // PandaScore fallback — no live round scores but has map names + picks
    const activeGames = (match.games || []).filter(g => g.status !== 'not_started' && g.status !== 'canceled');
    const mapItems = activeGames.map((g, idx) => {
      const mn = formatMapName(g.map?.name);
      const isRunning = g.status === 'running';
      const isDone    = g.status === 'finished';
      const { r1, r2 } = isDone ? extractRoundScore(g, t1?.id, t2?.id) : { r1: null, r2: null };
      const status = isDone ? 'done' : isRunning ? 'live' : 'pending';
      const pick = picks[idx] || null;
      return buildMapItem(mn, pick, r1, r2, status, t1?.id, t2?.id);
    }).join('');
    mapsHtml = `<div class="match-card__maps">${mapItems}</div>`;

  } else if (isLive) {
    // No game data at all yet — show dot progress
    const dots = Array.from({ length: match.number_of_games || 1 }, (_, i) => {
      const done = i < t1Maps + t2Maps, cur = i === t1Maps + t2Maps;
      const c = done ? 'var(--muted)' : cur ? 'var(--accent2)' : 'var(--border)';
      return `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};${cur ? 'box-shadow:0 0 7px var(--accent2)' : ''}"></span>`;
    }).join('');
    mapsHtml = `<div style="padding:9px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;margin-right:2px">KARTOR</span>${dots}</div>`;
  }

  return `
  <div class="match-card ${isLive ? 'live' : ''}" style="animation-delay:${delay}ms">
    <div class="match-card__top">
      <div class="match-meta">
        <span class="match-tournament" title="${tournament}">${tournament}</span>
        <span class="match-time">${timeStr}</span>
      </div>
      <div class="teams-section">
        <div class="team-col">
          <div class="team-row">${teamLogo(t1)}<span class="team-name${t1Win ? ' winner' : ''}${t1swe ? ' swe-hl' : ''}">${t1?.name || 'TBD'}</span></div>
          ${swePill(t1swe)}
        </div>
        <div class="score-section">
          <div class="score-main">
            <span style="color:${t1Win ? 'var(--accent)' : t2Win ? 'var(--muted)' : '#fff'}">${t1Maps}</span>
            <span class="score-sep">:</span>
            <span style="color:${t2Win ? 'var(--accent)' : t1Win ? 'var(--muted)' : '#fff'}">${t2Maps}</span>
          </div>
          <div class="score-bo">${bo}</div>
        </div>
        <div class="team-col right">
          <div class="team-row right">${teamLogo(t2)}<span class="team-name${t2Win ? ' winner' : ''}${t2swe ? ' swe-hl' : ''}">${t2?.name || 'TBD'}</span></div>
          ${swePill(t2swe, 'right')}
        </div>
      </div>
    </div>
    ${mapsHtml}
  </div>`;
}
</script>
</body>
</html>
